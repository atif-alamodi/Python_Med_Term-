<script>
const tabs=[
{id:'t1',icon:'🏠',label:'1: مقدمة بايثون'},
{id:'t2',icon:'📦',label:'2: المتغيرات'},
{id:'t3',icon:'🔢',label:'3: العوامل'},
{id:'t4',icon:'📋',label:'4: القوائم والصفوف'},
{id:'t5',icon:'🖨️',label:'5: print و input'},
{id:'t6',icon:'🐛',label:'6: الأخطاء'},
{id:'t7',icon:'💻',label:'محاكي بايثون'},
{id:'quiz',icon:'✅',label:'اختبار ذاتي (80)'}
];
let cur='t1';
const tabsEl=document.getElementById('tabs');
tabs.forEach(t=>{
const b=document.createElement('button');
b.className='tab'+(t.id===cur?' on':'');
b.textContent=t.icon+' '+t.label;
b.onclick=()=>{cur=t.id;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();window.scrollTo({top:0,behavior:'smooth'})};
tabsEl.appendChild(b);
});
const S={};

// ===== PYTHON MINI INTERPRETER =====
function pyRun(editorId,outputId,inputsObj){
var edEl=document.getElementById(editorId);
var outEl=document.getElementById(outputId);
if(!edEl||!outEl)return;
var code=edEl.value;
outEl.innerHTML='';
var output='';
var inputs=inputsObj||{};
var inputIdx=0;
var inputVals=Object.values(inputs);
var vars={};

try{
function fmtVal(x){
  if(x===null)return'None';if(x===true)return'True';if(x===false)return'False';
  if(Array.isArray(x))return'['+x.map(function(v){return typeof v==='string'?"'"+v+"'":fmtVal(v)}).join(', ')+']';
  return String(x);
}
function fmtPrint(x){
  if(x===null)return'None';if(x===true)return'True';if(x===false)return'False';
  if(Array.isArray(x))return'['+x.map(function(v){return typeof v==='string'?"'"+v+"'":fmtVal(v)}).join(', ')+']';
  return String(x);
}

function smartSplit(s,delim){
  var parts=[],depth=0,cur='',inStr=false,strCh='';
  for(var ci=0;ci<s.length;ci++){
    var c=s[ci];
    if(inStr){cur+=c;if(c===strCh)inStr=false;continue;}
    if(c==='"'||c==="'"){inStr=true;strCh=c;cur+=c;continue;}
    if(c==='('||c==='['||c==='{')depth++;
    if(c===')'||c===']'||c==='}')depth--;
    if(c===delim&&depth===0){parts.push(cur);cur='';}
    else cur+=c;
  }
  if(cur.trim())parts.push(cur);
  return parts;
}

function findTopLevel(expr,targets){
  // Find the rightmost top-level occurrence of any target string
  var depth=0,inStr=false,strCh='';
  for(var j=expr.length-1;j>=0;j--){
    var c=expr[j];
    // Simple string tracking (backwards is tricky, so we check pairs)
    if(c===')'||c===']')depth++;
    if(c==='('||c==='[')depth--;
    if(depth===0){
      for(var ti=0;ti<targets.length;ti++){
        var t=targets[ti];
        if(expr.slice(j,j+t.length)===t){
          return {pos:j,op:t};
        }
      }
    }
  }
  return null;
}

function findTopLevelLeft(expr,targets){
  var depth=0;
  for(var j=0;j<expr.length;j++){
    var c=expr[j];
    if(c==='('||c==='[')depth++;
    if(c===')'||c===']')depth--;
    if(depth===0){
      for(var ti=0;ti<targets.length;ti++){
        var t=targets[ti];
        if(expr.slice(j,j+t.length)===t){
          return {pos:j,op:t};
        }
      }
    }
  }
  return null;
}

function evalExpr(expr){
  expr=expr.trim();
  if(expr==='')return '';

  // f-string
  if(/^f['"]/.test(expr)){
    var s=expr.slice(2,-1);
    return s.replace(/\{([^}:]+)(?::([^}]*))?\}/g,function(_,e,fmt){
      var v=evalExpr(e);
      if(fmt&&fmt.indexOf('f')>=0){var d=parseInt(fmt.replace('.','').replace('f',''))||2;return Number(v).toFixed(d);}
      return v;
    });
  }

  // string literal - must be a single complete string
  if(expr[0]==='"'||expr[0]==="'"){
    var sq=expr[0],si=1;
    while(si<expr.length&&expr[si]!==sq)si++;
    if(si===expr.length-1)return expr.slice(1,-1);
  }
  // number
  if(expr!==''&&!isNaN(expr))return Number(expr);
  if(expr==='True')return true;
  if(expr==='False')return false;
  if(expr==='None')return null;

  // list literal - verify matching brackets
  if(expr[0]==='['){
    var ld=0;
    for(var li=0;li<expr.length;li++){if(expr[li]==='[')ld++;if(expr[li]===']')ld--;if(ld===0&&li===expr.length-1){
      if(expr==='[]')return[];
      return smartSplit(expr.slice(1,-1),',').map(function(x){return evalExpr(x.trim())});
    }if(ld===0&&li<expr.length-1)break;}
  }

  // Check for function call FIRST (before operators)
  var fcMatch=expr.match(/^(\w+)\(([\s\S]*)\)$/);
  if(fcMatch){
    // Verify balanced parens in args
    var d=0,ok=true;
    for(var ci=0;ci<fcMatch[2].length;ci++){if(fcMatch[2][ci]==='(')d++;if(fcMatch[2][ci]===')')d--;if(d<0){ok=false;break;}}
    if(ok&&d===0){
      var fn=fcMatch[1],argsStr=fcMatch[2];
      var args=argsStr.trim()===''?[]:smartSplit(argsStr,',').map(function(a){return a.trim()});
      var r=doCall(fn,args);
      if(r!==undefined)return r;
    }
  }

  // Method call: obj.method(args)
  {var md=0;
  for(var j=expr.length-1;j>=0;j--){
    if(expr[j]===')')md++;if(expr[j]==='(')md--;
    if(md===0&&expr[j]==='.'&&j>0){
      var rest=expr.slice(j+1);
      var mm=rest.match(/^(\w+)\(([\s\S]*)\)$/);
      if(mm){
        var obj=evalExpr(expr.slice(0,j)),meth=mm[1],mArgsStr=mm[2];
        var mArgs=mArgsStr.trim()===''?[]:smartSplit(mArgsStr,',').map(function(a){return evalExpr(a.trim())});
        var mr=doMethod(obj,meth,mArgs);
        if(mr!==undefined)return mr;
      }
      break;
    }
  }}

  // in / not in at top level (with string skipping)
  {var ind=0,inq=false,iqc='';
  for(var j=0;j<expr.length;j++){
    var ch=expr[j];
    if(!inq&&(ch==='"'||ch==="'")){inq=true;iqc=ch;continue;}
    if(inq&&ch===iqc){inq=false;continue;}
    if(inq)continue;
    if(ch==='('||ch==='[')ind++;if(ch===')'||ch===']')ind--;
    if(ind===0&&expr.slice(j,j+8)===' not in '){
      var nv=evalExpr(expr.slice(0,j)),nc=evalExpr(expr.slice(j+8));
      return Array.isArray(nc)?!nc.includes(nv):!String(nc).includes(String(nv));
    }
    if(ind===0&&expr.slice(j,j+4)===' in '){
      var iv=evalExpr(expr.slice(0,j)),ic=evalExpr(expr.slice(j+4));
      return Array.isArray(ic)?ic.includes(iv):String(ic).includes(String(iv));
    }
  }}


  // Indexing: obj[idx] - only if [ is preceded by identifier/]/}/)
  {var id2=0;
  for(var j=expr.length-1;j>=0;j--){
    if(expr[j]===']')id2++;
    if(expr[j]==='['){id2--;if(id2===0&&j>0&&/[\w\]\)\}]/.test(expr[j-1])){
      var oe=expr.slice(0,j),ie=expr.slice(j+1,-1);
      var obj=evalExpr(oe);
      if(ie.indexOf(':')>=0){
        var pp=ie.split(':');
        var st=pp[0].trim()?Number(evalExpr(pp[0])):0;
        var en=pp[1]&&pp[1].trim()?Number(evalExpr(pp[1])):undefined;
        return Array.isArray(obj)?obj.slice(st,en):String(obj).slice(st,en);
      }
      var idx=Number(evalExpr(ie));
      if(idx<0)idx=(Array.isArray(obj)?obj.length:String(obj).length)+idx;
      return Array.isArray(obj)?obj[idx]:String(obj)[idx];
    }}
  }}

  // not
  if(expr.indexOf('not ')===0)return !evalExpr(expr.slice(4));

  // and/or at top level
  {var f=findTopLevelLeft(expr,[' and ',' or ']);
  if(f){
    if(f.op===' and ')return evalExpr(expr.slice(0,f.pos))&&evalExpr(expr.slice(f.pos+5));
    if(f.op===' or ')return evalExpr(expr.slice(0,f.pos))||evalExpr(expr.slice(f.pos+4));
  }}

  // Comparisons at top level (scan left to right, skip strings)
  {var cd=0,cq=false,cqc='';
  for(var j=0;j<expr.length;j++){
    var ch=expr[j];
    if(!cq&&(ch==='"'||ch==="'")){cq=true;cqc=ch;continue;}
    if(cq&&ch===cqc){cq=false;continue;}
    if(cq)continue;
    if(ch==='('||ch==='[')cd++;if(ch===')'||ch===']')cd--;
    if(cd===0){
      var ops=[{s:'==',l:2},{s:'!=',l:2},{s:'>=',l:2},{s:'<=',l:2},{s:'>',l:1},{s:'<',l:1}];
      for(var oi=0;oi<ops.length;oi++){
        var o=ops[oi];
        if(expr.slice(j,j+o.l)===o.s){
          if(o.s==='='&&j>0&&'!><'.indexOf(expr[j-1])>=0)continue;
          if(o.s==='>'&&j>0&&(expr[j-1]==='='||expr[j-1]==='>'||expr[j-1]==='<'))continue;
          if(o.s==='<'&&j>0&&(expr[j-1]==='='||expr[j-1]==='<'))continue;
          if((o.s==='>'||o.s==='<')&&j>0&&expr[j-1]==='*')continue;
          var cl=evalExpr(expr.slice(0,j)),cr=evalExpr(expr.slice(j+o.l));
          if(o.s==='==')return cl==cr;if(o.s==='!=')return cl!=cr;
          if(o.s==='>=')return cl>=cr;if(o.s==='<=')return cl<=cr;
          if(o.s==='>')return cl>cr;if(o.s==='<')return cl<cr;
        }
      }
    }
  }}

  // +/- at top level (right to left, skip strings)
  {var pd=0,pq=false,pqc='';
  for(var j=expr.length-1;j>=0;j--){
    var ch=expr[j];
    if(!pq&&(ch==='"'||ch==="'")){pq=true;pqc=ch;continue;}
    if(pq&&ch===pqc){pq=false;continue;}
    if(pq)continue;
    if(ch===')'||ch===']')pd++;if(ch==='('||ch==='[')pd--;
    if(pd===0){
      if(ch==='+'&&j>0){
        var pl=evalExpr(expr.slice(0,j)),pr=evalExpr(expr.slice(j+1));
        if(typeof pl==='string'||typeof pr==='string')return String(pl)+String(pr);
        if(Array.isArray(pl)&&Array.isArray(pr))return pl.concat(pr);
        return Number(pl)+Number(pr);
      }
      if(ch==='-'&&j>0&&'+-*/%('.indexOf(expr[j-1])<0){
        return Number(evalExpr(expr.slice(0,j)))-Number(evalExpr(expr.slice(j+1)));
      }
    }
  }}

  // * / // % ** at top level (right to left, skip strings)
  {var md2=0,mq=false,mqc='';
  for(var j=expr.length-1;j>=0;j--){
    var ch=expr[j];
    if(!mq&&(ch==='"'||ch==="'")){mq=true;mqc=ch;continue;}
    if(mq&&ch===mqc){mq=false;continue;}
    if(mq)continue;
    if(ch===')'||ch===']')md2++;if(ch==='('||ch==='[')md2--;
    if(md2===0){
      if(expr[j]==='*'&&j>0){
        if(expr[j-1]==='*'){
          var pl=evalExpr(expr.slice(0,j-1)),pr=evalExpr(expr.slice(j+1));
          return Math.pow(Number(pl),Number(pr));
        }
        if(j+1<expr.length&&expr[j+1]==='*')continue;
        var pl=evalExpr(expr.slice(0,j)),pr=evalExpr(expr.slice(j+1));
        if(typeof pl==='string')return pl.repeat(Number(pr));
        if(typeof pr==='string')return pr.repeat(Number(pl));
        if(Array.isArray(pl)){var rr=[];for(var ri=0;ri<Number(pr);ri++)rr=rr.concat(pl);return rr;}
        if(Array.isArray(pr)){var rr=[];for(var ri=0;ri<Number(pl);ri++)rr=rr.concat(pr);return rr;}
        return Number(pl)*Number(pr);
      }
      if(expr[j]==='/'&&j>0){
        if(expr[j-1]==='/'){
          return Math.floor(Number(evalExpr(expr.slice(0,j-1)))/Number(evalExpr(expr.slice(j+1))));
        }
        if(j+1<expr.length&&expr[j+1]==='/')continue;
        return Number(evalExpr(expr.slice(0,j)))/Number(evalExpr(expr.slice(j+1)));
      }
      if(expr[j]==='%'&&j>0){
        return Number(evalExpr(expr.slice(0,j)))%Number(evalExpr(expr.slice(j+1)));
      }
    }
  }}

  // Parenthesized expression
  if(expr[0]==='('&&expr[expr.length-1]===')')return evalExpr(expr.slice(1,-1));

  // Variable lookup
  if(vars.hasOwnProperty(expr))return vars[expr];
  if(expr[0]==='-'&&!isNaN(expr.slice(1)))return Number(expr);
  throw new Error("NameError: name '"+expr+"' is not defined");
}

function doCall(fn,args){
  if(fn==='print'){
    var sep=' ',end='\n',pa=[];
    for(var i=0;i<args.length;i++){
      if(args[i].indexOf('sep=')===0)sep=evalExpr(args[i].slice(4));
      else if(args[i].indexOf('end=')===0)end=evalExpr(args[i].slice(4));
      else pa.push(evalExpr(args[i]));
    }
    output+=pa.map(fmtPrint).join(sep)+end;return '';
  }
  if(fn==='input'){
    var prompt=args.length?evalExpr(args[0]):'';
    output+=prompt;
    return inputIdx<inputVals.length?String(inputVals[inputIdx++]):'';
  }
  if(fn==='int')return parseInt(evalExpr(args[0]));
  if(fn==='float')return parseFloat(evalExpr(args[0]));
  if(fn==='str')return String(evalExpr(args[0]));
  if(fn==='type'){
    var v=evalExpr(args[0]);
    if(typeof v==='number'&&Number.isInteger(v))return "<class 'int'>";
    if(typeof v==='number')return "<class 'float'>";
    if(typeof v==='string')return "<class 'str'>";
    if(typeof v==='boolean')return "<class 'bool'>";
    if(Array.isArray(v))return "<class 'list'>";
    return "<class 'NoneType'>";
  }
  if(fn==='len'){var v=evalExpr(args[0]);return Array.isArray(v)?v.length:String(v).length;}
  if(fn==='max'){var v=evalExpr(args[0]);return Array.isArray(v)?Math.max.apply(null,v):Math.max.apply(null,args.map(function(a){return Number(evalExpr(a))}));}
  if(fn==='min'){var v=evalExpr(args[0]);return Array.isArray(v)?Math.min.apply(null,v):Math.min.apply(null,args.map(function(a){return Number(evalExpr(a))}));}
  if(fn==='sum'){var v=evalExpr(args[0]);return Array.isArray(v)?v.reduce(function(a,b){return a+b},0):0;}
  if(fn==='abs')return Math.abs(Number(evalExpr(args[0])));
  if(fn==='round'){var v=Number(evalExpr(args[0])),d=args[1]?Number(evalExpr(args[1])):0;return Number(v.toFixed(d));}
  if(fn==='range'){
    var a=args.map(function(x){return Number(evalExpr(x))});
    var start=0,stop,step=1;
    if(a.length===1)stop=a[0];else if(a.length===2){start=a[0];stop=a[1];}else{start=a[0];stop=a[1];step=a[2];}
    var r=[];for(var x=start;step>0?x<stop:x>stop;x+=step)r.push(x);return r;
  }
  if(fn==='list'){if(args.length===0)return[];var v=evalExpr(args[0]);if(typeof v==='string')return v.split('');return Array.from(v);}
  if(fn==='tuple'){if(args.length===0)return[];return Array.from(evalExpr(args[0]));}
  if(fn==='sorted'){var v=evalExpr(args[0]).slice();v.sort(function(a,b){return a>b?1:a<b?-1:0});return v;}
  if(fn==='bool'){return !!evalExpr(args[0]);}
  if(fn==='enumerate'){var v=evalExpr(args[0]),s=args[1]?Number(evalExpr(args[1])):0;return v.map(function(x,i){return[i+s,x]});}
  // user-defined function
  if(vars['__fn_'+fn]){
    var fdef=vars['__fn_'+fn],oldVars={};
    for(var k in vars)oldVars[k]=vars[k];
    for(var pi=0;pi<fdef.params.length;pi++)vars[fdef.params[pi]]=evalExpr(args[pi]);
    var ret=execBlock(fdef.body,0);
    vars=oldVars;return ret;
  }
  return undefined;
}

function doMethod(obj,method,args){
  if(Array.isArray(obj)){
    if(method==='append'){obj.push(args[0]);return '';}
    if(method==='extend'){for(var i=0;i<args[0].length;i++)obj.push(args[0][i]);return '';}
    if(method==='pop'){return args.length?obj.splice(args[0],1)[0]:obj.pop();}
    if(method==='remove'){var idx=obj.indexOf(args[0]);if(idx>-1)obj.splice(idx,1);return '';}
    if(method==='sort'){obj.sort(function(a,b){return a>b?1:a<b?-1:0});return '';}
    if(method==='reverse'){obj.reverse();return '';}
    if(method==='copy'){return obj.slice();}
    if(method==='index'){return obj.indexOf(args[0]);}
    if(method==='count'){var c=0;for(var i=0;i<obj.length;i++)if(obj[i]===args[0])c++;return c;}
    if(method==='insert'){obj.splice(args[0],0,args[1]);return '';}
  }
  if(typeof obj==='string'){
    if(method==='split'){return args.length?obj.split(args[0]):obj.split(/\s+/);}
    if(method==='join'){return args[0].join(obj);}
    if(method==='upper')return obj.toUpperCase();
    if(method==='lower')return obj.toLowerCase();
    if(method==='strip'||method==='trim')return obj.trim();
    if(method==='replace')return obj.split(args[0]).join(args[1]||'');
    if(method==='startswith')return obj.indexOf(args[0])===0;
    if(method==='endswith')return obj.indexOf(args[0])===obj.length-args[0].length;
    if(method==='find')return obj.indexOf(args[0]);
    if(method==='count'){var c=0,p=0;while((p=obj.indexOf(args[0],p))>=0){c++;p+=args[0].length;}return c;}
  }
  return undefined;
}

function execBlock(lines,startI){
  var i=startI||0;
  while(i<lines.length){
    var line=lines[i];
    var trimmed=line.replace(/^\s+/,'');
    if(trimmed===''||trimmed[0]==='#'){i++;continue;}

    // def
    if(trimmed.indexOf('def ')===0){
      var dm=trimmed.match(/def\s+(\w+)\(([^)]*)\):/);
      if(dm){
        var fname=dm[1],params=dm[2]?dm[2].split(',').map(function(p){return p.trim()}):[];
        var body=[];i++;
        while(i<lines.length&&(lines[i].length===0||lines[i][0]===' '||lines[i][0]==='\t')){
          body.push(lines[i].replace(/^    /,'').replace(/^\t/,''));i++;
        }
        vars['__fn_'+fname]={params:params,body:body};continue;
      }
    }

    // return
    if(trimmed.indexOf('return ')===0)return evalExpr(trimmed.slice(7));
    if(trimmed==='return')return null;

    // if/elif/else
    if(trimmed.indexOf('if ')===0||trimmed.indexOf('elif ')===0){
      var isElif=trimmed.indexOf('elif ')===0;
      var cond=trimmed.replace(/^(el)?if\s+/,'').replace(/:$/,'');
      var condVal=evalExpr(cond);
      i++;
      var block=[];
      while(i<lines.length&&lines[i].length>0&&(lines[i][0]===' '||lines[i][0]==='\t')){
        block.push(lines[i].replace(/^    /,'').replace(/^\t/,''));i++;
      }
      if(condVal){
        var ret=execBlock(block,0);
        while(i<lines.length){
          var nt=lines[i].replace(/^\s+/,'');
          if(nt.indexOf('elif ')===0||nt==='else:'){
            i++;while(i<lines.length&&lines[i].length>0&&(lines[i][0]===' '||lines[i][0]==='\t'))i++;
          }else break;
        }
        if(ret!==undefined)return ret;
      }else{
        if(i<lines.length&&lines[i].replace(/^\s+/,'').indexOf('elif ')===0)continue;
        if(i<lines.length&&lines[i].replace(/^\s+/,'')==='else:'){
          i++;var block2=[];
          while(i<lines.length&&lines[i].length>0&&(lines[i][0]===' '||lines[i][0]==='\t')){
            block2.push(lines[i].replace(/^    /,'').replace(/^\t/,''));i++;
          }
          var ret=execBlock(block2,0);
          if(ret!==undefined)return ret;
        }
      }
      continue;
    }
    if(trimmed==='else:'){i++;while(i<lines.length&&lines[i].length>0&&(lines[i][0]===' '||lines[i][0]==='\t'))i++;continue;}

    // for
    if(trimmed.indexOf('for ')===0){
      var fm=trimmed.match(/for\s+(.+)\s+in\s+(.+):/);
      if(fm){
        var varName=fm[1].trim(),iterExpr=fm[2].trim();
        i++;var block=[];
        while(i<lines.length&&lines[i].length>0&&(lines[i][0]===' '||lines[i][0]==='\t')){
          block.push(lines[i].replace(/^    /,'').replace(/^\t/,''));i++;
        }
        var iterable=evalExpr(iterExpr);
        if(Array.isArray(iterable)){
          for(var ii=0;ii<iterable.length;ii++){
            var item=iterable[ii];
            if(varName.indexOf(',')>=0){
              var names=varName.split(',').map(function(n){return n.trim()});
              if(Array.isArray(item)){for(var ni=0;ni<names.length;ni++)vars[names[ni]]=item[ni];}
            }else vars[varName]=item;
            execBlock(block,0);
          }
        }
      }
      continue;
    }

    // while
    if(trimmed.indexOf('while ')===0){
      var cond=trimmed.replace(/^while\s+/,'').replace(/:$/,'');
      i++;var block=[];
      while(i<lines.length&&lines[i].length>0&&(lines[i][0]===' '||lines[i][0]==='\t')){
        block.push(lines[i].replace(/^    /,'').replace(/^\t/,''));i++;
      }
      var limit=1000,cnt=0;
      while(evalExpr(cond)&&cnt<limit){execBlock(block,0);cnt++;}
      continue;
    }

    // del
    if(trimmed.indexOf('del ')===0){
      var target=trimmed.slice(4).trim();
      var dm2=target.match(/^(.+)\[(.+)\]$/);
      if(dm2){var obj=evalExpr(dm2[1]),idx=Number(evalExpr(dm2[2]));if(Array.isArray(obj))obj.splice(idx,1);}
      else delete vars[target];
      i++;continue;
    }

    // Augmented assignment
    var augOps=['+=','-=','*=','//=','/=','%=','**='];
    var foundAug=false;
    for(var ai=0;ai<augOps.length;ai++){
      var ao=augOps[ai];
      var aoIdx=trimmed.indexOf(ao);
      if(aoIdx>0){
        var vn=trimmed.slice(0,aoIdx).trim(),val=evalExpr(trimmed.slice(aoIdx+ao.length).trim());
        var cur=vars[vn];
        if(ao==='+='){vars[vn]=typeof cur==='string'?cur+val:Number(cur)+Number(val);}
        else if(ao==='-=')vars[vn]=Number(cur)-Number(val);
        else if(ao==='*=')vars[vn]=Number(cur)*Number(val);
        else if(ao==='//=')vars[vn]=Math.floor(Number(cur)/Number(val));
        else if(ao==='/=')vars[vn]=Number(cur)/Number(val);
        else if(ao==='%=')vars[vn]=Number(cur)%Number(val);
        else if(ao==='**=')vars[vn]=Math.pow(Number(cur),Number(val));
        foundAug=true;break;
      }
    }
    if(foundAug){i++;continue;}

    // Multiple statements with ;
    if(trimmed.indexOf(';')>=0){
      var stmts=trimmed.split(';');
      for(var si=0;si<stmts.length;si++){
        var stmt=stmts[si].trim();if(!stmt)continue;
        if(stmt.indexOf('=')>=0&&stmt.indexOf('==')<0){
          var eqIdx=stmt.indexOf('=');
          if(eqIdx>0&&'!><'.indexOf(stmt[eqIdx-1])<0&&stmt[eqIdx+1]!=='='){
            vars[stmt.slice(0,eqIdx).trim()]=evalExpr(stmt.slice(eqIdx+1).trim());
          }else evalExpr(stmt);
        }else evalExpr(stmt);
      }
      i++;continue;
    }

    // Assignment
    if(trimmed.indexOf('=')>=0&&trimmed.indexOf('==')<0){
      var eqIdx=trimmed.indexOf('=');
      if(eqIdx>0&&'!><'.indexOf(trimmed[eqIdx-1])<0&&trimmed[eqIdx+1]!=='='){
        var lhs=trimmed.slice(0,eqIdx).trim(),rhs=trimmed.slice(eqIdx+1).trim();
        // Tuple unpacking
        if(lhs.indexOf(',')>=0){
          var names=lhs.split(',').map(function(n){return n.trim()});
          var val=evalExpr(rhs);
          if(Array.isArray(val)){for(var ni=0;ni<names.length;ni++)vars[names[ni]]=val[ni];}
        }
        // Index assignment
        else if(lhs.match(/\[.+\]$/)){
          var im=lhs.match(/^(.+)\[(.+)\]$/);
          var obj=evalExpr(im[1]),idx=Number(evalExpr(im[2])),val=evalExpr(rhs);
          if(Array.isArray(obj)){if(idx<0)idx=obj.length+idx;obj[idx]=val;}
        }
        else vars[lhs]=evalExpr(rhs);
        i++;continue;
      }
    }

    // Expression statement
    evalExpr(trimmed);
    i++;
  }
}

var lines=code.split('\n');
execBlock(lines,0);
outEl.innerHTML=output?'<span class="ok">'+output.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>':'<span style="color:#94a3b8">✅ تم التنفيذ بنجاح (لا يوجد مخرجات)</span>';
}catch(e){

}
}


function makePyEditor(id,code,height){

return '<div class="py-editor"><div class="py-bar"><span>🐍 Python Editor</span><button class="btn btn-gr" onclick="pyRun(\'ed_'+id+'\',\'out_'+id+'\')">▶ تشغيل</button></div><textarea id="ed_'+id+'" class="py-ta" style="min-height:'+height+'px">'+code+'</textarea><div id="out_'+id+'" class="py-out" style="color:#94a3b8">اضغط "تشغيل" لرؤية النتيجة</div></div>';
}

function makePyEditorWithInputs(id,code,inputs,height){
height=height||120;
var inputFields='';
var inputNames=Object.keys(inputs);
for(var ni=0;ni<inputNames.length;ni++){
  var name=inputNames[ni];
  inputFields+='<div style="margin:.3rem 0;display:flex;align-items:center;gap:.4rem;font-size:.78rem"><label style="color:#fbbf24;min-width:100px">'+inputs[name]+':</label><input id="inp_'+id+'_'+name+'" class="py-ta" style="min-height:auto;padding:.3rem;border:1px solid #333;border-radius:4px;flex:1" value=""></div>';
}
return '<div class="py-editor"><div class="py-bar"><span>🐍 Python Editor (مع إدخال)</span><button class="btn btn-gr" onclick="runWithInputs(\''+id+'\','+JSON.stringify(inputNames)+')">▶ تشغيل</button></div>'+inputFields+'<textarea id="ed_'+id+'" class="py-ta" style="min-height:'+height+'px">'+code+'</textarea><div id="out_'+id+'" class="py-out" style="color:#94a3b8">أدخل القيم ثم اضغط "تشغيل"</div></div>';
}

function runWithInputs(id,inputNames){
var inputs={};
for(var i=0;i<inputNames.length;i++){
  var name=inputNames[i];
  var el=document.getElementById('inp_'+id+'_'+name);
  inputs[name]=el?el.value:'';
}
pyRun('ed_'+id,'out_'+id,inputs);
}

S.t3=`<div class="card">

</div>

<div class="ez">العامل مثل الطبّاخ: يأخذ المكونات (المعاملات) ويسوي منها طبخة (النتيجة)!<br>
🍳 + (الجمع) يأخذ 5 و 3 → يعطيك 8<br>
🍳 * (الضرب) يأخذ 4 و 2 → يعطيك 8</div>

<h3>➕ العوامل الحسابية</h3>
<div class="tw"><table>
<tr><th>العامل</th><th>الاسم</th><th>مثال</th><th>النتيجة</th></tr>
<tr><td style="color:#fbbf24;font-weight:bold;font-size:1.1rem">+</td><td>الجمع</td><td>5 + 3</td><td>8</td></tr>
<tr><td style="color:#fbbf24;font-weight:bold;font-size:1.1rem">-</td><td>الطرح</td><td>10 - 4</td><td>6</td></tr>
<tr><td style="color:#fbbf24;font-weight:bold;font-size:1.1rem">*</td><td>الضرب</td><td>6 * 7</td><td>42</td></tr>
<tr><td style="color:#fbbf24;font-weight:bold;font-size:1.1rem">/</td><td>القسمة العشرية</td><td>7 / 2</td><td>3.5</td></tr>
<tr><td style="color:#fbbf24;font-weight:bold;font-size:1.1rem">//</td><td>القسمة الصحيحة</td><td>7 // 2</td><td>3</td></tr>
<tr><td style="color:#fbbf24;font-weight:bold;font-size:1.1rem">%</td><td>باقي القسمة</td><td>7 % 3</td><td>1</td></tr>
<tr><td style="color:#fbbf24;font-weight:bold;font-size:1.1rem">**</td><td>الأس (القوة)</td><td>2 ** 3</td><td>8</td></tr>
</table></div>

<div class="ez">

<b>%</b> باقي القسمة: 7 % 3 = 1 (لأن 7 = 3×2 + <b>1</b>، الباقي هو 1)<br>

</div>

${makePyEditor('ops1','x = 10\ny = 3\n\nprint("الجمع:", x + y)        # 13\nprint("الطرح:", x - y)        # 7\nprint("الضرب:", x * y)        # 30\nprint("القسمة:", x / y)       # 3.333...\nprint("القسمة الصحيحة:", x // y)  # 3\nprint("باقي القسمة:", x % y)  # 1\nprint("الأس:", x ** 2)        # 100',150)}

<h3>🧮 استخدامات عملية لباقي القسمة %</h3>

</div>

</div>

<div class="ez">مثل الرياضيات في المدرسة! الأقواس أولاً، ثم الأس، ثم الضرب والقسمة، ثم الجمع والطرح.<br>

1️⃣ <b>SyntaxError</b> → خطأ في كتابة الكود (قواعد اللغة)<br>
2️⃣ <b>NameError</b> → استخدام متغير غير معرّف<br>
3️⃣ <b>TypeError</b> → خلط أنواع بيانات غير متوافقة
</div>

<div class="ez">الأخطاء مثل الأخطاء الإملائية في العربي:<br>
🔴 <b>SyntaxError</b> = كتبت كلمة غلط (primt بدل print)<br>
🔴 <b>NameError</b> = ذكرت اسم شخص ما يعرفه أحد<br>
🔴 <b>TypeError</b> = حاولت تجمع تفاح مع أرقام!</div>

<h3>🔴 SyntaxError - خطأ في بناء الكود</h3>
<div class="cb r"><div class="lb" style="color:#f87171">أمثلة شائعة:</div>

<code>print("hello"</code> → نسيت قوس الإغلاق<br>

</div>

${makePyEditor('err1','# جرّب تصحيح هذا الكود:\nprimt("مرحبا")  # الخطأ: primt بدل print',60)}

<h3>🔴 NameError - متغير غير معرّف</h3>
<div class="cb r"><div class="lb" style="color:#f87171">يحدث عندما تستخدم اسم متغير لم تعرّفه بعد</div>

<h3>🔴 TypeError - خلط الأنواع</h3>

// ===== Quiz Functions =====
let quizAnswered=0,quizCorrect=0;

function makeQ(id,q){
let html=`<div class="qc" id="${id}"><h4>${q.q.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</h4>`;
q.o.forEach((o,i)=>{
  let cls=o.includes('print(')||o.includes('=')||o.includes('[')||o.includes('(')||o.includes('>')||o.includes('<')?'':'ar';
  html+=`<div class="qo ${cls}" onclick="ansQ('${id}',${i},${q.a},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`;
});
html+=`<div class="qe" id="${id}_e">${q.e.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div></div>`;
return html;
}

function ansQ(id,chosen,correct,el){
if(el.classList.contains('d'))return;
let qc=document.getElementById(id);
qc.querySelectorAll('.qo').forEach(o=>{o.classList.add('d');});
quizAnswered++;
if(chosen===correct){
  el.classList.add('ok');quizCorrect++;
  let e=document.getElementById(id+'_e');e.className='qe s ok';
}else{
  el.classList.add('no');
  qc.querySelectorAll('.qo')[correct].classList.add('ok');
  let e=document.getElementById(id+'_e');e.className='qe s no';
}
document.getElementById('quizScore').textContent=quizCorrect+' / 80';
document.getElementById('quizBar').style.width=(quizAnswered/80*100)+'%';
}

function resetQuiz(){
quizAnswered=0;quizCorrect=0;
document.getElementById('quizScore').textContent='0 / 80';
document.getElementById('quizBar').style.width='0%';
document.querySelectorAll('.qo').forEach(o=>{o.classList.remove('ok','no','d');});
document.querySelectorAll('.qe').forEach(e=>{e.className='qe';});
window.scrollTo({top:0,behavior:'smooth'});
}

// ===== Render =====
function render(){
document.getElementById('content').innerHTML=S[cur]||'<div class="card"><h2>قريباً...</h2></div>';
}
render();
</script>
